[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[fmt]
line_length = 120
tab_width = 4

# Etherscan API V2 (the V1 verification endpoint is deprecated). A single
# etherscan.io API key works across chains; the chain id is sent automatically.
# Set ETHERSCAN_API_KEY to an etherscan.io key, then deploy with --verify.
[etherscan]
base = { key = "${ETHERSCAN_API_KEY}", chain = 8453, url = "https://api.etherscan.io/v2/api" }
